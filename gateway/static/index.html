<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TTS Hub — voz local</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c232c;
    --border: #2b3441;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #4c9aff;
    --accent-soft: rgba(76, 154, 255, .14);
    --ok: #3fb950;
    --off: #6e7681;
    --err: #f85149;
    --rec: #f85149;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f6f8; --panel: #fff; --panel-2: #f0f3f6; --border: #d7dee6;
      --text: #1a1f26; --muted: #5e6b7a; --accent-soft: rgba(76,154,255,.12);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2rem 1rem 4rem;
    font: 15px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  header { margin-bottom: 1.5rem; }
  h1 { margin: 0 0 .3rem; font-size: 1.6rem; letter-spacing: -.02em; }
  .sub { color: var(--muted); font-size: .9rem; }
  .tabs { display: flex; gap: .5rem; margin: 1.25rem 0; }
  .tab {
    padding: .5rem 1rem; font: inherit; cursor: pointer; color: var(--muted);
    background: transparent; border: 1px solid transparent;
    border-radius: 8px; border-bottom: 2px solid transparent;
  }
  .tab[aria-selected="true"] { color: var(--text); background: var(--panel); border-color: var(--border); }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem;
  }
  label.field { display: block; font-size: .8rem; text-transform: uppercase;
    letter-spacing: .06em; color: var(--muted); margin-bottom: .5rem; }
  textarea {
    width: 100%; min-height: 150px; resize: vertical; padding: .85rem;
    font: inherit; color: var(--text); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px;
  }
  textarea:focus, select:focus, button:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  .engines { display: grid; gap: .75rem; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
  .engine {
    text-align: left; cursor: pointer; padding: .9rem; color: inherit; font: inherit;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
    transition: border-color .15s, background .15s;
  }
  .engine:hover:not(:disabled) { border-color: var(--accent); }
  .engine[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-soft); }
  .engine:disabled { opacity: .5; cursor: not-allowed; }
  .engine .name { font-weight: 600; display: flex; align-items: center; gap: .4rem; }
  .engine .tag { font-size: .75rem; color: var(--muted); margin: .15rem 0 .4rem; }
  .engine .desc { font-size: .8rem; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--off); flex: none; }
  .dot.online { background: var(--ok); }
  .row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; margin-top: 1rem; }
  .row > div { flex: 1 1 160px; }
  select {
    width: 100%; padding: .55rem; font: inherit; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
  }
  .check { display: flex; align-items: center; gap: .45rem; flex: 0 0 auto; padding-bottom: .55rem; }
  button.go {
    padding: .7rem 1.5rem; font: inherit; font-weight: 600; cursor: pointer;
    color: #fff; background: var(--accent); border: 0; border-radius: 8px;
  }
  button.go:disabled { opacity: .55; cursor: progress; }
  audio { width: 100%; margin-top: 1rem; }
  .status { margin-top: .9rem; font-size: .85rem; color: var(--muted); min-height: 1.2em; }
  .status.error { color: var(--err); }
  a.dl { color: var(--accent); font-size: .85rem; }

  /* conversación */
  .mic-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  button.mic {
    width: 74px; height: 74px; border-radius: 50%; cursor: pointer; flex: none;
    font-size: 1.6rem; color: #fff; background: var(--accent); border: 0;
    transition: background .15s, transform .1s;
  }
  button.mic:disabled { opacity: .5; cursor: not-allowed; }
  button.mic.recording { background: var(--rec); animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 50% { transform: scale(1.07); } }
  .svc { font-size: .85rem; color: var(--muted); }
  .svc div { display: flex; align-items: center; gap: .4rem; margin-bottom: .2rem; }
  .log { margin-top: 1.25rem; display: flex; flex-direction: column; gap: .6rem; }
  .msg { padding: .65rem .85rem; border-radius: 10px; max-width: 85%; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent-soft); border: 1px solid var(--border); }
  .msg.bot { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>TTS Hub</h1>
    <div class="sub">Voz 100 % local — PocketTTS · Kokoro · Chatterbox · Whisper</div>
    <div class="tabs" role="tablist">
      <button class="tab" id="tab-tts" role="tab" aria-selected="true">Texto a voz</button>
      <button class="tab" id="tab-chat" role="tab" aria-selected="false">Conversar</button>
    </div>
  </header>

  <!-- ============ pestaña: texto a voz ============ -->
  <section id="panel-tts">
    <div class="card">
      <label class="field" for="text">Texto</label>
      <textarea id="text" placeholder="Escribe aquí lo que quieres escuchar…">Hola, esto es una prueba de voz generada completamente en local, sin conexión a internet.</textarea>
      <div class="row">
        <div style="flex:0 0 auto"><button class="go" id="go">Generar voz</button></div>
      </div>
      <audio id="player" controls></audio>
      <div class="status" id="status"></div>
    </div>
  </section>

  <!-- ============ pestaña: conversar ============ -->
  <section id="panel-chat" class="hidden">
    <div class="card">
      <div class="mic-row">
        <button class="mic" id="mic" title="Pulsa para hablar">&#127908;</button>
        <div>
          <div id="chatStatus" class="status" style="margin:0 0 .5rem">Pulsa el micrófono y habla.</div>
          <div class="svc" id="svc"></div>
        </div>
        <div style="flex:1"></div>
        <button class="go" id="clear" style="background:transparent;color:var(--muted);border:1px solid var(--border)">Borrar</button>
      </div>
      <div class="log" id="log"></div>
      <audio id="chatPlayer" controls class="hidden"></audio>
    </div>
  </section>

  <!-- ============ voz compartida por ambas pestañas ============ -->
  <div class="card">
    <label class="field">Motor de voz</label>
    <div class="engines" id="engines"></div>
    <div class="row">
      <div>
        <label class="field" for="voice">Voz</label>
        <select id="voice"></select>
      </div>
      <div id="speedWrap">
        <label class="field" for="speed">Velocidad</label>
        <select id="speed">
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
      </div>
      <label class="check"><input type="checkbox" id="stream" checked> Progresiva</label>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let engines = [];
let selected = null;
let lastUrl = null;
let history = [];
let recorder = null;
let recording = false;

/* ---------- pestañas ---------- */
function showTab(which) {
  const isTts = which === 'tts';
  $('tab-tts').setAttribute('aria-selected', String(isTts));
  $('tab-chat').setAttribute('aria-selected', String(!isTts));
  $('panel-tts').classList.toggle('hidden', !isTts);
  $('panel-chat').classList.toggle('hidden', isTts);
  if (!isTts) loadServices();
}
$('tab-tts').onclick = () => showTab('tts');
$('tab-chat').onclick = () => showTab('chat');

/* ---------- motores ---------- */
function setStatus(el, msg, isError = false) {
  el.textContent = msg;
  el.classList.toggle('error', isError);
}

function renderEngines() {
  const box = $('engines');
  box.innerHTML = '';
  for (const eng of engines) {
    const btn = document.createElement('button');
    btn.className = 'engine';
    btn.type = 'button';
    btn.disabled = eng.status !== 'online';
    btn.setAttribute('aria-pressed', String(eng.id === selected));
    btn.innerHTML = `
      <div class="name"><span class="dot ${eng.status}"></span>${eng.name}</div>
      <div class="tag">${eng.tagline}</div>
      <div class="desc">${eng.status === 'online' ? eng.description : 'No disponible'}</div>`;
    btn.onclick = () => { selected = eng.id; renderEngines(); renderVoices(); };
    box.appendChild(btn);
  }
}

function renderVoices() {
  const eng = engines.find((e) => e.id === selected);
  const sel = $('voice');
  sel.innerHTML = '';
  if (!eng) return;
  for (const v of eng.voices) {
    const opt = document.createElement('option');
    opt.value = v.id;
    opt.textContent = v.language && v.language !== 'auto' ? `${v.id}  (${v.language})` : v.id;
    sel.appendChild(opt);
  }
  const es = eng.voices.find((v) => v.language === 'es');
  if (es) sel.value = es.id;

  $('speedWrap').style.display = eng.id === 'kokoro' ? '' : 'none';
  // Progressive playback works for every engine: the backend falls back to
  // whole-segment requests when an engine has no native streaming endpoint.
}

async function loadEngines() {
  setStatus($('status'), 'Consultando motores…');
  try {
    engines = await (await fetch('/api/engines')).json();
  } catch (err) {
    return setStatus($('status'), 'No se pudo contactar con el gateway: ' + err, true);
  }
  const online = engines.find((e) => e.status === 'online');
  selected = online ? online.id : null;
  renderEngines();
  renderVoices();
  const n = engines.filter((e) => e.status === 'online').length;
  setStatus($('status'), n ? `${n} de ${engines.length} motores listos.` :
    'Ningún motor responde todavía — puede seguir descargando modelos.', !n);
}

/* ---------- síntesis ---------- */
async function synthesize(text, useStream) {
  const res = await fetch('/api/speak', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      engine: selected, text, voice: $('voice').value,
      speed: parseFloat($('speed').value), stream: useStream,
    }),
  });
  if (!res.ok) throw new Error((await res.text()).slice(0, 300));
  return res.blob();
}

// Listener attached to the `ended` event of #player while a progressive job
// is in flight. Tracked separately so a new generation can detach it before
// attaching its own, and so it never touches `lastUrl` (that variable is
// reserved for the blob-URL revoke discipline used by the non-progressive
// path and the chat tab).
let progressiveEndedHandler = null;

function clearProgressiveEnded() {
  if (progressiveEndedHandler) {
    $('player').removeEventListener('ended', progressiveEndedHandler);
    progressiveEndedHandler = null;
  }
}

// Progressive path: never buffers the response. `<audio>.src` is pointed
// straight at the streaming endpoint so playback starts on the first
// synthesised sentence instead of waiting for the whole text.
async function generateProgressive(text) {
  const player = $('player');
  const res = await fetch('/api/speak/prepare', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      engine: selected, text, voice: $('voice').value,
      speed: parseFloat($('speed').value),
    }),
  });
  if (!res.ok) throw new Error((await res.text()).slice(0, 300));
  const { id, count } = await res.json();
  const plural = count === 1 ? 'fragmento' : 'fragmentos';

  player.src = `/api/speak/stream/${id}`;
  player.play().catch(() => {});
  setStatus($('status'), `Reproduciendo — ${count} ${plural}`);

  progressiveEndedHandler = async () => {
    const fileUrl = `/api/speak/file/${id}`;
    let assembled = true;
    try {
      const check = await fetch(fileUrl, { method: 'HEAD' });
      assembled = check.status !== 409;
    } catch (err) {
      assembled = false;
    }
    if (!assembled) {
      return setStatus($('status'),
        `Reproducción completa — ${count} ${plural}. El audio aún no está listo para descargar, prueba de nuevo en un momento.`, true);
    }
    setStatus($('status'), `Reproducción completa — ${count} ${plural} · `);
    const a = document.createElement('a');
    a.className = 'dl'; a.href = fileUrl;
    a.download = `tts-${selected}-${Date.now()}.wav`;
    a.textContent = 'descargar .wav';
    $('status').appendChild(a);
  };
  player.addEventListener('ended', progressiveEndedHandler, { once: true });
}

async function generate() {
  const text = $('text').value.trim();
  if (!text) return setStatus($('status'), 'Escribe algo primero.', true);
  if (!selected) return setStatus($('status'), 'No hay ningún motor disponible.', true);

  clearProgressiveEnded();
  $('go').disabled = true;
  const t0 = performance.now();
  setStatus($('status'), 'Generando…');
  try {
    if ($('stream').checked) {
      await generateProgressive(text);
    } else {
      const blob = await synthesize(text, false);
      if (lastUrl) URL.revokeObjectURL(lastUrl);
      lastUrl = URL.createObjectURL(blob);
      $('player').src = lastUrl;
      $('player').play().catch(() => {});
      const secs = ((performance.now() - t0) / 1000).toFixed(2);
      setStatus($('status'), `Listo en ${secs} s · ${(blob.size / 1024).toFixed(0)} KB · `);
      const a = document.createElement('a');
      a.className = 'dl'; a.href = lastUrl;
      a.download = `tts-${selected}-${Date.now()}.wav`;
      a.textContent = 'descargar .wav';
      $('status').appendChild(a);
    }
  } catch (err) {
    setStatus($('status'), 'Error: ' + err.message, true);
  } finally {
    $('go').disabled = false;
  }
}

$('go').onclick = generate;
$('text').addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate();
});

/* ---------- conversación ---------- */
async function loadServices() {
  const box = $('svc');
  box.innerHTML = '<div>Comprobando servicios…</div>';
  try {
    const s = await (await fetch('/api/services')).json();
    box.innerHTML = `
      <div><span class="dot ${s.stt.status}"></span>Whisper ${s.stt.model || ''} ${s.stt.device ? '(' + s.stt.device + ')' : ''}</div>
      <div><span class="dot ${s.llm.status}"></span>LLM ${s.llm.status === 'online' ? s.llm.model : 'sin conexión — ' + s.llm.url}</div>`;
    $('mic').disabled = s.stt.status !== 'online' || s.llm.status !== 'online';
    if (s.llm.status !== 'online') {
      setStatus($('chatStatus'),
        'El LLM no responde. En LM Studio activa "Serve on local network".', true);
    }
  } catch (err) {
    box.innerHTML = '<div>No se pudo comprobar el estado.</div>';
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  div.textContent = text;
  $('log').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function startRecording() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    return setStatus($('chatStatus'), 'Sin acceso al micrófono: ' + err.message, true);
  }
  const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
  recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
  const parts = [];
  recorder.ondataavailable = (e) => e.data.size && parts.push(e.data);
  recorder.onstop = async () => {
    stream.getTracks().forEach((t) => t.stop());
    await handleTurn(new Blob(parts, { type: recorder.mimeType || 'audio/webm' }));
  };
  recorder.start();
  recording = true;
  $('mic').classList.add('recording');
  setStatus($('chatStatus'), 'Escuchando… pulsa otra vez para enviar.');
}

function stopRecording() {
  recording = false;
  $('mic').classList.remove('recording');
  if (recorder && recorder.state !== 'inactive') recorder.stop();
}

async function handleTurn(blob) {
  $('mic').disabled = true;
  setStatus($('chatStatus'), 'Transcribiendo y pensando…');
  const t0 = performance.now();
  try {
    const form = new FormData();
    form.append('file', blob, 'turno.webm');
    form.append('history', JSON.stringify(history.slice(-12)));
    const res = await fetch('/api/converse', { method: 'POST', body: form });
    if (!res.ok) throw new Error((await res.text()).slice(0, 300));
    const { user_text, reply_text } = await res.json();

    addMessage('user', user_text);
    addMessage('bot', reply_text);
    history.push({ role: 'user', content: user_text });
    history.push({ role: 'assistant', content: reply_text });

    const thought = ((performance.now() - t0) / 1000).toFixed(1);
    setStatus($('chatStatus'), `Respuesta en ${thought} s · generando voz…`);

    const audio = await synthesize(reply_text, false);
    if (lastUrl) URL.revokeObjectURL(lastUrl);
    lastUrl = URL.createObjectURL(audio);
    const player = $('chatPlayer');
    player.classList.remove('hidden');
    player.src = lastUrl;
    player.play().catch(() => {});
    setStatus($('chatStatus'),
      `Turno completo en ${((performance.now() - t0) / 1000).toFixed(1)} s. Pulsa para responder.`);
  } catch (err) {
    setStatus($('chatStatus'), 'Error: ' + err.message, true);
  } finally {
    $('mic').disabled = false;
  }
}

$('mic').onclick = () => (recording ? stopRecording() : startRecording());
$('clear').onclick = () => {
  history = [];
  $('log').innerHTML = '';
  $('chatPlayer').classList.add('hidden');
  setStatus($('chatStatus'), 'Conversación borrada.');
};

loadEngines();
</script>
</body>
</html>
